<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#081019">
  <title>NorthStar — Offline</title>
  <style>
    :root{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#081019;color:#edf3f8;font-family:Arial,Helvetica,sans-serif}.card{max-width:520px;margin:24px;padding:28px;border:1px solid #213244;border-radius:18px;background:#101b27;box-shadow:0 12px 30px rgba(0,0,0,.25)}h1{margin:0 0 12px;color:#d7b56d}p{line-height:1.55;color:#aebdca}.note{font-size:13px;color:#8ea0b2}
  </style>
</head>
<body>
  <main class="card">
    <h1>NorthStar is offline</h1>
    <p>Reconnect to the internet, then reopen or refresh the app.</p>
    <p class="note">For privacy, portfolio balances, holdings and transactions are not stored for offline viewing.</p>
  </main>
</body>
</html>
